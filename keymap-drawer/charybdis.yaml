combos:
- p: [16, 15]
  k: DELETE
- p: [16, 14]
  k: BACKSPACE
- p: [36, 22]
  k: Gui+;
- p: [16, 19]
  k: ENTER
- p: [24, 36]
  k: {t: SwapCtrlGui, h: toggle}
- p: [27, 28]
  k: '['
- p: [32, 31]
  k: ']'
- p: [36, 39]
  k: {t: Ctl+LEFT SHIFT, h: sticky}
  l: [BASE]
- p: [36, 39]
  k: Gui+LEFT SHIFT
  l: [SwapCtrlGui]
- p: [28, 27, 26, 25]
  k: '&bootloader'
- p: [31, 32, 33, 34]
  k: '&bootloader'
- p: [7, 8, 9, 10]
  k: BT CLR
