# Bluetooth/USB device name — SINGLE SOURCE for both local and CI builds.
# This conf is shared by both halves, so the name set here wins over the
# shield Kconfig default. Max 16 characters (CONFIG_ZMK_KEYBOARD_NAME limit).
CONFIG_ZMK_KEYBOARD_NAME="Charybdis Mini"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_POINTING=y

# Connection params: keep MIN <= MAX (Zephyr default MIN_INT=24 was > MAX=9, an
# invalid range that made the peripheral's param-update request malformed).
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# Slave latency: the right half is the split central AND the host BLE link
# endpoint, so this governs trackball->host reporting. Latency >0 lets the
# central skip connection events on a perceived-idle link. At 16 the skip window
# (~240ms at MAX_INT=12) stalled pointer reports mid-use (intermittent ~0.5s
# stutter); 0 fixed the stutter but began coinciding with random unrecoverable
# disconnects (suspected CPU/BLE overload from servicing every connection event,
# never skipping). 8 is the middle ground: a ~120ms skip window — small enough
# to keep the trackball smooth, large enough to relieve the per-event load.
# If stutter returns, lower toward 0; if disconnects persist, latency isn't it.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=8

# Supervision timeout (x10ms = 4s); was unset, so a single missed window over a
# long idle could drop the link without recovery.
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
# Zephyr 4.1 BUILD_ASSERT requires BT_BUF_EVT_RX_COUNT > BT_BUF_ACL_TX_COUNT
CONFIG_BT_BUF_EVT_RX_COUNT=33

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512


# Experimental features
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
