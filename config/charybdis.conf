# Bluetooth/USB device name — SINGLE SOURCE for both local and CI builds.
# This conf is shared by both halves, so the name set here wins over the
# shield Kconfig default. Max 16 characters (CONFIG_ZMK_KEYBOARD_NAME limit).
CONFIG_ZMK_KEYBOARD_NAME="Charybdis Mini"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_POINTING=y

# Connection params: keep MIN <= MAX (Zephyr default MIN_INT=24 was > MAX=9, an
# invalid range that made the peripheral's param-update request malformed).
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# --- BLE radio-contention fix (2026-07-01) --------------------------------
# Root cause of BOTH the trackball lag AND the random unrecoverable disconnects:
# the right half is simultaneously split-CENTRAL (to the left half) and
# host-PERIPHERAL (HID to the computer) on the Zephyr SW link layer. The split
# link ran at 7.5ms (ZMK_SPLIT_BLE_PREF_INT=6) while the host link runs at 15ms;
# 15 = 2*7.5, so the host anchor collided with every OTHER split anchor (anchor
# lock). At host latency 0 the host events were repeatedly starved -> host
# supervision timeout (host forces ~720ms; our 4s pref is ignored) -> dead link.
# Raising host latency only HID it (8 -> ~120ms skip window = the lag). Thread
# analyzer proved it is NOT CPU (idle ~50%): it's radio scheduling.
#
# Fix: align the split link to 15ms too. Equal periods let BT_CTLR_SCHED_ADVANCED
# (default y for central builds) place the two anchors NON-overlapping (host at t,
# split at t+7.5ms), halving mandatory central radio events and freeing every host
# event -> host latency 0 becomes safe -> kills lag and crash together. Split key
# latency worst-case rises 7.5->15ms (imperceptible). The SPLIT_BLE_* keys are
# central-only (guarded by ZMK_SPLIT_ROLE_CENTRAL), inert on the left half.
# If disconnects persist, bump CONFIG_BT_PERIPHERAL_PREF_LATENCY 0 -> 2 (30ms).
CONFIG_ZMK_SPLIT_BLE_PREF_INT=12
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=15
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Supervision timeout (x10ms = 4s); was unset, so a single missed window over a
# long idle could drop the link without recovery.
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
# Zephyr 4.1 BUILD_ASSERT requires BT_BUF_EVT_RX_COUNT > BT_BUF_ACL_TX_COUNT
CONFIG_BT_BUF_EVT_RX_COUNT=33

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512


# Experimental features
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
