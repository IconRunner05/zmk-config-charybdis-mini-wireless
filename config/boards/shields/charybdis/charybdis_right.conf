/* PMW3610 Driver - Now using native Zephyr driver */
/* Previously used external badjeff driver with CONFIG_PMW3610_ALT=y */
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

/* Previously had: CONFIG_ZMK_EXT_POWER=y */
/* Removed - not needed for native driver */

/* Mouse acceleration input processor */
CONFIG_ZMK_INPUT_PROCESSOR_MACCEL=y

/* Previously had all these PMW3610_ALT configs - now handled by native driver/device tree:
 * - CONFIG_PMW3610_ALT=y
 * - CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
 * - CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=40
 * - CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
 * - CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
 */

