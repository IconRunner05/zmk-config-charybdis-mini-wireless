manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: m165437
      url-base: https://github.com/M165437
    - name: iconrunner05
      url-base: https://github.com/IconRunner05
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: nice-view-gem
      remote: m165437
      revision: main
    # Fork of badjeff/zmk-pmw3610-driver, pinned. Adds a backoff-retry on failed
    # motion reads so a failed burst read can't livelock the level-triggered IRQ
    # (right-half CPU peg -> BLE supervision timeout / reboot). Repoint to badjeff
    # once the fix lands upstream.
    - name: zmk-pmw3610-driver
      remote: iconrunner05
      revision: 6f47e6931e30fa81992e73c44b9bdc7f137043ba
    - name: zmk-input-processor-report-rate-limit
      remote: badjeff
      revision: main
  self:
    path: config
