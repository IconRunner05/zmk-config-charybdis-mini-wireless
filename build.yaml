# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano@2//zmk
    shield: charybdis_left nice_view_adapter nice_view_gem
  - board: nice_nano@2//zmk
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  # --- DEBUG build for the weekend-crash investigation ---
  # Right half (central) with USB logging via ZMK's dedicated zmk-usb-logging
  # snippet. The snippet sets up the USB CDC ACM device, points chosen
  # zephyr,console at it, and enables CONFIG_ZMK_USB_LOGGING (debug level) --
  # the supported path on hardware-model boards (nice_nano@2//zmk). Do NOT also
  # set the raw CONFIG_ZMK_USB_LOGGING / studio snippet: that path lacks the
  # console chosen node and fails to build.
  # Flash this .uf2 to the RIGHT half, tether via USB, run
  # scripts/zmk_serial_debug.sh, and wait for the panic/fault dump.
  # Remove this entry once diagnosed.
  - board: nice_nano@2//zmk
    shield: charybdis_right
    snippet: zmk-usb-logging
    artifact-name: charybdis_right_debug
  - board: nice_nano@2//zmk
    shield: settings_reset
